services:
  catalogue:
    build: ./catalogue
    image: ayyappavedavyas/catalogue:1.0.0
    container_name: catalogue
    depends_on:
    - mongodb

  cart:
    build: ./cart
    image: ayyappavedavyas/cart:1.0.0
    container_name: cart
    depends_on:
    - redis
    - catalogue

  user:
    build: ./user
    image: ayyappavedavyas/user:1.0.0
    container_name: user
    depends_on:
    - redis  
    - mongodb

  shipping:
    build: ./shipping
    image: ayyappavedavyas/shipping:1.0.0
    container_name: shipping
    depends_on:
    - mysql
    - cart
    environment:
      - DB_HOST=mysql

  payment:
    build: ./payment
    image: ayyappavedavyas/payment:1.0.0
    container_name: payment
    depends_on:
    - rabbitmq
    - cart
    - user

  frontend:
    build: ./frontend
    image: ayyappavedavyas/frontend:1.0.0
    container_name: frontend
    ports:
    - "80:80"
    depends_on:
    - catalogue
    - cart
    - user
    - payment
    - shipping    

  redis:
    image: redis:7.0
    container_name: redis
    volumes:
    - redis:/data

  rabbitmq:
    image: rabbitmq:3.8
    container_name: rabbitmq  
    environment:
      RABBITMQ_DEFAULT_USER: roboshop
      RABBITMQ_DEFAULT_PASS: roboshop123
    volumes:
    - rabbitmq:/var/lib/rabbitmq

  mongodb:
    build: ./mongodb
    image: ayyappavedavyas/mmongodb:1.0.0
    container_name: mongodb
    volumes:
    - mongodb:/data/db

  mysql:
    build: ./mysql
    image: ayyappavedavyas/mysql:1.0.0
    container_name: mysql
    
    volumes:
    - mysql:/var/lib/mysql

networks:
  default:
    name: roboshop
    driver: bridge
    external: false  

volumes:
  mysql:
  mongodb:
  redis:
  rabbitmq:    